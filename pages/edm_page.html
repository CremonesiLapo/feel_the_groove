<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDM Energy | Feel The Groove</title>
    <link rel="stylesheet" href="../style/edm_page.css">
</head>

<body>

    <a class="back-button" href="../index.html">Go Back</a>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="eras-container">
        <div class="eras-header">
            <h1>EDM Energy</h1>
            <p>Pick a drop and dive into the night</p>
        </div>

        <div class="decades-grid">
            <!-- Big Room Card -->
            <div class="decade-card bigroom">
                <div class="decade-visual">
                    <div class="pulse-orb">
                        <div class="pulse-core"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Big Room</div>
                    <div class="decade-range">Festival Anthems</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Kick Drums</span>
                        <span class="decade-genre">Massive Drops</span>
                        <span class="decade-genre">Hands Up</span>
                        <span class="decade-genre">Stadium Energy</span>
                    </div>
                </div>
            </div>

            <!-- Future Bass Card -->
            <div class="decade-card futurebass">
                <div class="decade-visual">
                    <div class="neon-wave">
                        <div class="wave-line"></div>
                        <div class="wave-line"></div>
                        <div class="wave-line"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Future Bass</div>
                    <div class="decade-range">Warm, Wide, Airy</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Lush Chords</span>
                        <span class="decade-genre">Vocal Chops</span>
                        <span class="decade-genre">Sidechain</span>
                        <span class="decade-genre">Glow Synths</span>
                    </div>
                </div>
            </div>

            <!-- Trance Card -->
            <div class="decade-card trance">
                <div class="decade-visual">
                    <div class="laser-triangle">
                        <div class="laser-line"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Trance</div>
                    <div class="decade-range">Hypnotic Rises</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Arpeggios</span>
                        <span class="decade-genre">Build Ups</span>
                        <span class="decade-genre">Euphoric</span>
                        <span class="decade-genre">Endless Flow</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
