<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pop &amp; Dance | Feel The Groove</title>
    <link rel="stylesheet" href="../style/pop_dance_page.css">
</head>

<body>

    <a class="back-button" href="../index.html">Go Back</a>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="eras-container">
        <div class="eras-header">
            <h1>Pop &amp; Dance</h1>
            <p>Bright hooks and glowing floors</p>
        </div>

        <div class="decades-grid">
            <!-- Dance Pop Card -->
            <div class="decade-card dancepop">
                <div class="decade-visual">
                    <div class="spotlight">
                        <div class="spotlight-core"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Dance Pop</div>
                    <div class="decade-range">Radio Heat</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Big Choruses</span>
                        <span class="decade-genre">Glossy Beats</span>
                        <span class="decade-genre">Sing Along</span>
                        <span class="decade-genre">Stadium Ready</span>
                    </div>
                </div>
            </div>

            <!-- Eurodance Card -->
            <div class="decade-card eurodance">
                <div class="decade-visual">
                    <div class="neon-star">
                        <div class="star-inner"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Eurodance</div>
                    <div class="decade-range">90s Flash</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Fast BPM</span>
                        <span class="decade-genre">Rap Hooks</span>
                        <span class="decade-genre">Synth Leads</span>
                        <span class="decade-genre">Euphoric</span>
                    </div>
                </div>
            </div>

            <!-- Nu-Disco Card -->
            <div class="decade-card nudisco">
                <div class="decade-visual">
                    <div class="mirror-ball">
                        <div class="mirror-grid"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Nu-Disco</div>
                    <div class="decade-range">Retro Shine</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Funk Lines</span>
                        <span class="decade-genre">Modern Glitter</span>
                        <span class="decade-genre">Groove Bass</span>
                        <span class="decade-genre">Late Night</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
