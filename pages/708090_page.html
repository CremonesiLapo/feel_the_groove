<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Waves | 70s 80s 90s</title>
    <link rel="stylesheet" href="../style/708090_page.css">
</head>

<body>

    <a class="back-button" href="../index.html">Go Back</a>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="eras-container">
        <div class="eras-header">
            <h1>Choose Your Era</h1>
            <p>Click to explore the sounds that defined generations</p>
        </div>

        <div class="decades-grid">
            <!-- 70s Card -->
            <div class="decade-card seventies">
                <div class="decade-visual">
                    <div class="vinyl-icon">
                        <div class="vinyl-label">GROOVE</div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">70s</div>
                    <div class="decade-range">1970 — 1979</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Disco</span>
                        <span class="decade-genre">Funk</span>
                        <span class="decade-genre">Rock</span>
                        <span class="decade-genre">Punk</span>
                        <span class="decade-genre">Soul</span>
                    </div>
                </div>
            </div>

            <!-- 80s Card -->
            <div class="decade-card eighties">
                <div class="decade-visual">
                    <div class="tv-icon">
                        <div class="tv-screen">
                            <div class="tv-text">MTV</div>
                        </div>
                        <div class="tv-knob"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">80s</div>
                    <div class="decade-range">1980 — 1989</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Synth-Pop</span>
                        <span class="decade-genre">New Wave</span>
                        <span class="decade-genre">Hair Metal</span>
                        <span class="decade-genre">Hip Hop</span>
                    </div>
                </div>
            </div>

            <!-- 90s Card -->
            <div class="decade-card nineties">
                <div class="decade-visual">
                    <div class="cd-icon">
                        <div class="cd-center"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">90s</div>
                    <div class="decade-range">1990 — 1999</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Grunge</span>
                        <span class="decade-genre">Hip Hop</span>
                        <span class="decade-genre">Britpop</span>
                        <span class="decade-genre">Techno</span>
                        <span class="decade-genre">R&B</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
