<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>House Feeling | Feel The Groove</title>
    <link rel="stylesheet" href="../style/house_feeling_page.css">
</head>

<body>

    <a class="back-button" href="../index.html">Go Back</a>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="eras-container">
        <div class="eras-header">
            <h1>House Feeling</h1>
            <p>Warm grooves, late-night light</p>
        </div>

        <div class="decades-grid">
            <!-- Classic House Card -->
            <div class="decade-card classic">
                <div class="decade-visual">
                    <div class="sunset-disk">
                        <div class="sunset-ring"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Classic House</div>
                    <div class="decade-range">1980s Roots</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Piano Chords</span>
                        <span class="decade-genre">Soul Samples</span>
                        <span class="decade-genre">Warehouse</span>
                        <span class="decade-genre">Jackin' Beats</span>
                    </div>
                </div>
            </div>

            <!-- Deep House Card -->
            <div class="decade-card deep">
                <div class="decade-visual">
                    <div class="deep-pulse">
                        <div class="deep-dot"></div>
                        <div class="deep-dot"></div>
                        <div class="deep-dot"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Deep House</div>
                    <div class="decade-range">Smooth &amp; Moody</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Silky Bass</span>
                        <span class="decade-genre">Late Night</span>
                        <span class="decade-genre">Vocal Lines</span>
                        <span class="decade-genre">Atmosphere</span>
                    </div>
                </div>
            </div>

            <!-- Tech House Card -->
            <div class="decade-card tech">
                <div class="decade-visual">
                    <div class="house-grid">
                        <div class="house-roof"></div>
                        <div class="house-body"></div>
                    </div>
                </div>
                <div class="decade-info">
                    <div class="decade-year">Tech House</div>
                    <div class="decade-range">Club Engines</div>
                    <div class="decade-genres">
                        <span class="decade-genre">Chunky Kicks</span>
                        <span class="decade-genre">Rolling Bass</span>
                        <span class="decade-genre">Minimal Hooks</span>
                        <span class="decade-genre">Peak Hours</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
