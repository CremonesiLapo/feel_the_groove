<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Feel The Groove</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <section class="slide slide-hero" style="height: 100vh;">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>

        <img src="assets/images/feel_the_groove_no_background.png" alt="Feel The Groove" class="logo-image corner-logo">
        <div class="hero-content">
            <div class="broken-mixer">
                <div class="mixer-panel"></div>
                <div class="mixer-slider slider-1"></div>
                <div class="mixer-slider slider-2"></div>
                <div class="mixer-slider slider-3"></div>
                <div class="mixer-knob knob-1"></div>
                <div class="mixer-knob knob-2"></div>
                <div class="mixer-knob knob-3"></div>
            </div>
            <h1 class="hero-title">404</h1>
            <p class="hero-subtitle">Lost the beat — this page never made the mix</p>
            <a class="cta-button" href="index.html">Back to Home</a>
        </div>
    </section>

    <style>
        .broken-mixer {
            width: clamp(220px, 45vw, 320px);
            height: clamp(150px, 30vw, 220px);
            margin: 0 auto 24px;
            position: relative;
            --slider-1: 10%;
            --slider-2: 41%;
            --slider-3: 72%;
            --slider-1-center: calc(var(--slider-1) + 9%);
            --slider-2-center: calc(var(--slider-2) + 9%);
            --slider-3-center: calc(var(--slider-3) + 9%);
        }

        .mixer-panel {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f0f 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .mixer-slider {
            position: absolute;
            width: 18%;
            height: 60%;
            top: 18%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .slider-1 { left: var(--slider-1); }
        .slider-2 { left: var(--slider-2); }
        .slider-3 { left: var(--slider-3); }

        .mixer-slider::after {
            content: '';
            position: absolute;
            left: 20%;
            right: 20%;
            top: 18%;
            height: 16%;
            background: linear-gradient(90deg, #fb5607, #ffbe0b);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(251, 86, 7, 0.4);
            animation: faderMove 2.8s ease-in-out infinite;
        }

        .slider-2::after {
            animation-delay: 0.6s;
        }

        .slider-3::after {
            animation-delay: 1.2s;
        }

        .mixer-knob {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #0f0f0f;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            transform: translateX(-50%);
        }

        .knob-1 { left: var(--slider-1-center); bottom: 10%; }
        .knob-2 { left: var(--slider-2-center); bottom: 10%; }
        .knob-3 { left: var(--slider-3-center); bottom: 10%; }

        @keyframes faderMove {
            0% {
                top: 15%;
            }
            50% {
                top: 65%;
            }
            100% {
                top: 15%;
            }
        }

        .corner-logo {
            position: fixed;
            top: 18px;
            left: 18px;
            height: clamp(36px, 4vw, 64px);
            width: auto;
            z-index: 2;
        }
    </style>
</body>

</html>
